<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Compte – SpaceGame</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .compte-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .player-card {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 20px;
      padding: 48px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      box-shadow: 0 8px 40px #0006;
    }

    .player-character {
      position: relative;
      width: 90px;
      height: 110px;
    }

    .char-body {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 80px;
      background: var(--skin-color, #e84141);
      border-radius: 35px 35px 20px 20px;
      transition: background 0.3s;
    }

    .char-visor {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 54px;
      height: 30px;
      background: #7ecfff;
      border-radius: 27px 27px 10px 10px;
      border: 3px solid #333;
      box-shadow: inset 0 4px 8px #fff4;
    }

    .char-bag {
      position: absolute;
      right: -6px;
      bottom: 24px;
      width: 18px;
      height: 28px;
      background: var(--skin-color, #e84141);
      border-radius: 6px;
      filter: brightness(0.75);
      transition: background 0.3s;
    }

    .char-leg-left,
    .char-leg-right {
      position: absolute;
      bottom: -14px;
      width: 24px;
      height: 20px;
      background: var(--skin-color, #e84141);
      border-radius: 0 0 10px 10px;
      filter: brightness(0.8);
      transition: background 0.3s;
    }
    .char-leg-left  { left: 8px; }
    .char-leg-right { right: 8px; }

    .pseudo-display {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
      order: -1;
    }

    .edit-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .edit-section label { color: #888; font-size: 0.85rem; }

    .edit-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .edit-row input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .edit-row input:focus { border-color: #a259ff; }

    .edit-row button {
      background: #a259ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .edit-row button:hover { background: #8a3de8; }

    .colors-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .colors-section label { color: #888; font-size: 0.85rem; }

    .color-swatches {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .swatch:hover  { transform: scale(1.2); }
    .swatch.active { border-color: #fff; transform: scale(1.2); }
  </style>
</head>
<body>
  <div class="page">

    <aside class="sidebar">
      <div class="logo">🚀 SpaceGame</div>
      <nav class="nav-left">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 Accueil</button>
        <button class="nav-btn" onclick="location.href='boutique.html'">🛒 Boutique</button>
      </nav>
    </aside>

    <main class="compte-center">
      <div class="player-card">

        <div class="pseudo-display" id="pseudoDisplay">Joueur</div>

        <div class="player-character" id="character">
          <div class="char-visor"></div>
          <div class="char-bag"></div>
          <div class="char-leg-left"></div>
          <div class="char-leg-right"></div>
          <div class="char-body"></div>
        </div>

        <div class="edit-section">
          <label>Changer de pseudo</label>
          <div class="edit-row">
            <input id="pseudoInput" type="text" maxlength="16" placeholder="Nouveau pseudo…" />
            <button onclick="savePseudo()">✔</button>
          </div>
        </div>

        <div class="colors-section">
          <label>Couleur du personnage</label>
          <div class="color-swatches" id="swatches"></div>
        </div>

      </div>
    </main>
  </div>

  <script>
    const COLORS = [
      { name: 'Rouge',  hex: '#e84141' },
      { name: 'Bleu',   hex: '#4166e8' },
      { name: 'Vert',   hex: '#41e868' },
      { name: 'Jaune',  hex: '#e8d841' },
      { name: 'Orange', hex: '#e87841' },
      { name: 'Rose',   hex: '#e841b8' },
      { name: 'Cyan',   hex: '#41d4e8' },
      { name: 'Blanc',  hex: '#dddddd' },
      { name: 'Noir',   hex: '#333344' },
      { name: 'Violet', hex: '#a259ff' },
    ];

    let pseudo = localStorage.getItem('pseudo') || 'Joueur';
    let color  = localStorage.getItem('skinColor') || '#e84141';

    function applyPseudo() {
      document.getElementById('pseudoDisplay').textContent = pseudo;
    }

    function applyColor(hex) {
      color = hex;
      document.getElementById('character').style.setProperty('--skin-color', hex);
      document.querySelectorAll('.swatch').forEach(s =>
        s.classList.toggle('active', s.dataset.color === hex)
      );
    }

    function savePseudo() {
      const val = document.getElementById('pseudoInput').value.trim();
      if (!val) return;
      pseudo = val;
      localStorage.setItem('pseudo', pseudo);
      applyPseudo();
      document.getElementById('pseudoInput').value = '';
    }

    const swatchContainer = document.getElementById('swatches');
    COLORS.forEach(c => {
      const div = document.createElement('div');
      div.className = 'swatch';
      div.style.background = c.hex;
      div.dataset.color = c.hex;
      div.title = c.name;
      div.onclick = () => {
        localStorage.setItem('skinColor', c.hex);
        applyColor(c.hex);
      };
      swatchContainer.appendChild(div);
    });

    applyPseudo();
    applyColor(color);
  </script>
</body>
</html>

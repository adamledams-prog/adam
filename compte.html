<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Compte – SpaceGame</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .compte-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .player-card {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 20px;
      padding: 48px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      box-shadow: 0 8px 40px #0006;
    }

    .player-character {
      width: 130px;
      height: 130px;
      filter: drop-shadow(0 8px 24px #0009);
      animation: gd-bounce 0.7s infinite alternate ease-in-out;
    }

    @keyframes gd-bounce {
      from { transform: translateY(0px);   }
      to   { transform: translateY(-10px); }
    }

    .gd-main  { transition: fill 0.3s; }
    .gd-dark  { transition: fill 0.3s; stroke: none; }
    .gd-light { transition: fill 0.3s; }

    .pseudo-display {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
      order: -1;
    }

    .edit-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .edit-section label { color: #888; font-size: 0.85rem; }

    .edit-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .edit-row input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .edit-row input:focus { border-color: #a259ff; }

    .edit-row button {
      background: #a259ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .edit-row button:hover { background: #8a3de8; }

    .colors-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .colors-section label { color: #888; font-size: 0.85rem; }

    .color-swatches {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .swatch:hover  { transform: scale(1.2); }
    .swatch.active { border-color: #fff; transform: scale(1.2); }
  </style>
</head>
<body>
  <div class="page">

    <aside class="sidebar">
      <div class="logo">🚀 SpaceGame</div>
      <nav class="nav-left">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 Accueil</button>
        <button class="nav-btn" onclick="location.href='boutique.html'">🛒 Boutique</button>
      </nav>
    </aside>

    <main class="compte-center">
      <div class="player-card">

        <div class="pseudo-display" id="pseudoDisplay">Joueur</div>

        <div class="player-character" id="character">
          <!-- SVG Cube Geometry Dash -->
          <svg id="gdCube" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="130" height="130">
            <!-- Ombre au sol -->
            <ellipse cx="50" cy="97" rx="28" ry="4" fill="#000" opacity="0.25"/>
            <!-- Corps principal -->
            <rect class="gd-main" x="8" y="8" width="84" height="84" rx="10"/>
            <!-- Bordure intérieure sombre -->
            <rect class="gd-dark" x="14" y="14" width="72" height="72" rx="7"/>
            <!-- Barre verticale -->
            <rect class="gd-light" x="44" y="20" width="12" height="60" rx="5"/>
            <!-- Barre horizontale -->
            <rect class="gd-light" x="20" y="44" width="60" height="12" rx="5"/>
            <!-- Diamant central -->
            <polygon class="gd-light" points="50,30 70,50 50,70 30,50"/>
            <!-- Points de coins -->
            <circle class="gd-light" cx="26" cy="26" r="6"/>
            <circle class="gd-light" cx="74" cy="26" r="6"/>
            <circle class="gd-light" cx="26" cy="74" r="6"/>
            <circle class="gd-light" cx="74" cy="74" r="6"/>
            <!-- Centre blanc -->
            <circle fill="#fff" cx="50" cy="50" r="7" opacity="0.9"/>
          </svg>
        </div>

        <div class="edit-section">
          <label>Changer de pseudo</label>
          <div class="edit-row">
            <input id="pseudoInput" type="text" maxlength="16" placeholder="Nouveau pseudo…" />
            <button onclick="savePseudo()">✔</button>
          </div>
        </div>

        <div class="colors-section">
          <label>Couleur du personnage</label>
          <div class="color-swatches" id="swatches"></div>
        </div>

      </div>
    </main>
  </div>

  <script>
    const COLORS = [
      { name: 'Rouge',  hex: '#e84141' },
      { name: 'Bleu',   hex: '#4166e8' },
      { name: 'Vert',   hex: '#41e868' },
      { name: 'Jaune',  hex: '#e8d841' },
      { name: 'Orange', hex: '#e87841' },
      { name: 'Rose',   hex: '#e841b8' },
      { name: 'Cyan',   hex: '#41d4e8' },
      { name: 'Blanc',  hex: '#dddddd' },
      { name: 'Noir',   hex: '#333344' },
      { name: 'Violet', hex: '#a259ff' },
    ];

    let pseudo = localStorage.getItem('pseudo') || 'Joueur';
    let color  = localStorage.getItem('skinColor') || '#e84141';

    function applyPseudo() {
      document.getElementById('pseudoDisplay').textContent = pseudo;
    }

    function applyColor(hex) {
      color = hex;
      const dark  = shadeColor(hex, -40);
      const light = shadeColor(hex, +60);
      document.querySelectorAll('.gd-main').forEach(el => el.setAttribute('fill', hex));
      document.querySelectorAll('.gd-dark').forEach(el => el.setAttribute('fill', dark));
      document.querySelectorAll('.gd-light').forEach(el => el.setAttribute('fill', light));
      document.querySelectorAll('.swatch').forEach(s =>
        s.classList.toggle('active', s.dataset.color === hex)
      );
    }

    // Assombrit une couleur hex de `amount` (négatif = plus sombre)
    function shadeColor(hex, amount) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.min(255, Math.max(0, (num >> 16) + amount));
      const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amount));
      const b = Math.min(255, Math.max(0, (num & 0xff) + amount));
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function savePseudo() {
      const val = document.getElementById('pseudoInput').value.trim();
      if (!val) return;
      pseudo = val;
      localStorage.setItem('pseudo', pseudo);
      applyPseudo();
      document.getElementById('pseudoInput').value = '';
    }

    const swatchContainer = document.getElementById('swatches');
    COLORS.forEach(c => {
      const div = document.createElement('div');
      div.className = 'swatch';
      div.style.background = c.hex;
      div.dataset.color = c.hex;
      div.title = c.name;
      div.onclick = () => {
        localStorage.setItem('skinColor', c.hex);
        applyColor(c.hex);
      };
      swatchContainer.appendChild(div);
    });

    applyPseudo();
    applyColor(color);
  </script>
</body>
</html>
